name: Release

# Tag-driven release: push a tag like `v1.5.3` and this builds the app on every
# OS and publishes a (draft) GitHub Release. The app's updater reads the feed from
# https://github.com/<owner>/<repo>/releases/latest/download (see package.json >
# build.publish), so publishing the draft is what makes clients auto-update.
#
# Channel ↔ branch (enforced by the validate-tag job below):
#   • STABLE  vX.Y.Z         must be tagged from `main` → DRAFT release (review → Publish).
#   • BETA    vX.Y.Z-beta.N  must be tagged from `dev`  → rolling `beta` pre-release, live now.
#
# Beta:   git switch dev && npm version prerelease --preid beta && git push --follow-tags
# Stable: land work on main via PR (main is protected), then tag the merge commit on main
#         and push the tag (tags are not branch-protected):
#           git switch main && git pull && git tag vX.Y.Z && git push origin vX.Y.Z
#
# `releases/latest/download` only resolves to a published, non-prerelease release,
# so nothing reaches stable users until you publish the draft.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # allow a manual dry-run from the Actions tab

# Least privilege at the workflow level: the build jobs run third-party code
# (npm ci postinstall, electron-builder, cmake) and must NOT hold a write token.
# Only the final `release` job escalates to contents: write.
permissions:
  contents: read

env:
  NODE_VERSION: '22'
  # Sidecar build sources, pinned. WHISPER_SHA is the commit the v1.8.5 tag points
  # to (annotated tag) — verified after clone so a moved tag can't slip code in.
  WHISPER_TAG: v1.8.5
  WHISPER_SHA: f24588a272ae8e23280d9c220536437164e6ed28

jobs:
  # ── Guard: the release channel must match the branch. A plain vX.Y.Z (stable)
  #    must be tagged from main; a vX.Y.Z-beta.N (prerelease) from dev. Runs first
  #    and gates every build job, so a mis-tagged release never even builds.
  validate-tag:
    name: Validate tag channel/branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Enforce stable→main / beta→dev
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"; SHA="${GITHUB_SHA}"
          git fetch --quiet origin main dev
          if [[ "$TAG" == *-* ]]; then
            git merge-base --is-ancestor "$SHA" origin/dev \
              || { echo "::error::Beta release $TAG must be tagged from 'dev'."; exit 1; }
            echo "ok: beta $TAG is on dev"
          else
            git merge-base --is-ancestor "$SHA" origin/main \
              || { echo "::error::Stable release $TAG must be tagged from 'main'."; exit 1; }
            echo "ok: stable $TAG is on main"
          fi

  # ── Prebuilt apps: build natively per-OS (this is what removes the need to
  #    cross-compile native modules like better-sqlite3 from a single machine).
  build-app:
    name: Build (${{ matrix.os }})
    needs: [validate-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon runner -> arm64 dmg/zip
            artifact: mac
          - os: ubuntu-latest # -> AppImage
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + app
        # electron-builder rebuilds native modules for Electron's ABI (npmRebuild,
        # on by default). `--publish never`: we upload via the release job below.
        env:
          # The app is intentionally unsigned (ad-hoc on macOS via afterSign).
          # Stop electron-builder from looking for a Developer ID certificate.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          node build/prepare-playwright.cjs
          npx vite build
          npx electron-builder --publish never

      - name: Collect feed artifacts
        run: |
          mkdir -p out
          # Only the update-feed files; never the unpacked app dirs. With
          # generateUpdatesFilesForAllChannels off, electron-builder emits just the
          # manifest for THIS build's channel (latest-*.yml for a plain vX.Y.Z,
          # beta-*.yml for a vX.Y.Z-beta.N prerelease), so a plain `*.yml` glob is
          # already channel-correct — no stray alpha-/beta- manifests in stable.
          # No *.blockmap / mac *.zip: the in-app updater downloads the full .dmg,
          # so the Squirrel zip and the differential blockmaps are dead weight.
          cp release/*.dmg release/*.yml out/ 2>/dev/null || true
          cp release/*.AppImage out/ 2>/dev/null || true
          # builder-debug.yml is electron-builder's own debug dump — never ship it.
          rm -f out/builder-debug.yml
          ls -la out

      - uses: actions/upload-artifact@v7
        with:
          name: feed-${{ matrix.artifact }}
          path: out/
          if-no-files-found: error

  # ── Windows self-rebuild feed: source zip + manifest (no native build needed).
  build-source-feed:
    name: Source feed (Windows self-rebuild)
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate source feed
        run: |
          # Prerelease tags (e.g. v1.5.3-beta.1) feed the beta channel
          # (source-beta.json); plain vX.Y.Z tags feed stable (source.json).
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then export SHELFY_CHANNEL=beta; fi
          node scripts/make-source-feed.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: feed-source
          path: |
            release/SHELFY-src-*.zip
            release/source*.json
          if-no-files-found: error

  # ── macOS mini-pack: whisper-server (built from source — no upstream macOS
  #    binary) + ffmpeg (from ffmpeg-static). yt-dlp and llama-server are NOT here:
  #    binaries.js downloads them directly from upstream on the client.
  #    NOTE: the whisper.cpp build layout (binary name, which libs/rpath) is the
  #    one piece not verifiable locally — sanity-check the first run's logs.
  build-mac-pack:
    name: Mac mini-pack (whisper + ffmpeg)
    needs: [validate-tag]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps (provides ffmpeg-static)
        run: npm ci

      - name: Build whisper.cpp (Metal + server) from source
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$WHISPER_TAG" https://github.com/ggml-org/whisper.cpp
          GOT="$(git -C whisper.cpp rev-parse HEAD)"
          test "$GOT" = "$WHISPER_SHA" || { echo "whisper.cpp tag moved: $GOT != $WHISPER_SHA"; exit 1; }
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=ON
          cmake --build whisper.cpp/build -j --config Release
          mkdir -p .vlm/whisper
          SERVER="$(find whisper.cpp/build -type f \( -name 'whisper-server' -o -name 'server' \) -print -quit)"
          test -n "$SERVER" || { echo 'whisper-server binary not found after build'; exit 1; }
          cp -a "$SERVER" .vlm/whisper/whisper-server
          # Every shared lib the server needs (whisper + ggml backends incl. metal),
          # preserving symlinks so the relative dylib links survive.
          find whisper.cpp/build -name '*.dylib' -exec cp -a {} .vlm/whisper/ \;
          find whisper.cpp/build -name 'ggml-metal.metal' -exec cp -a {} .vlm/whisper/ \; 2>/dev/null || true
          echo '--- .vlm/whisper:'; ls -la .vlm/whisper

      - name: Build mini-pack
        run: node scripts/make-binary-packs.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: feed-mac-pack
          path: |
            release/shelfy-bin-*.tar.gz
            release/binaries-*.json
          if-no-files-found: error

  # ── Linux mini-pack: whisper-server (built from source) + ffmpeg. yt-dlp and
  #    llama-server come directly from upstream on the client (ensureBinariesLinux).
  build-linux-pack:
    name: Linux mini-pack (whisper + ffmpeg)
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps (provides ffmpeg-static)
        run: npm ci

      - name: Build whisper.cpp (server) from source
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$WHISPER_TAG" https://github.com/ggml-org/whisper.cpp
          GOT="$(git -C whisper.cpp rev-parse HEAD)"
          test "$GOT" = "$WHISPER_SHA" || { echo "whisper.cpp tag moved: $GOT != $WHISPER_SHA"; exit 1; }
          # GGML_NATIVE=OFF: don't bake in -march=native, so the binary runs on any
          # x86-64 user machine, not just the runner's CPU.
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build whisper.cpp/build -j --config Release
          mkdir -p .vlm/whisper
          SERVER="$(find whisper.cpp/build -type f \( -name 'whisper-server' -o -name 'server' \) -print -quit)"
          test -n "$SERVER" || { echo 'whisper-server binary not found after build'; exit 1; }
          cp -a "$SERVER" .vlm/whisper/whisper-server
          # Shared libs (.so), preserving symlinks (libfoo.so -> libfoo.so.x).
          find whisper.cpp/build -name '*.so*' -exec cp -a {} .vlm/whisper/ \;
          echo '--- .vlm/whisper:'; ls -la .vlm/whisper

      - name: Build mini-pack
        run: node scripts/make-binary-packs.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: feed-linux-pack
          path: |
            release/shelfy-bin-*.tar.gz
            release/binaries-*.json
          if-no-files-found: error

  # ── Assemble everything into one draft GitHub Release for this tag.
  release:
    name: Publish draft release
    needs: [build-app, build-source-feed, build-mac-pack, build-linux-pack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # only this job needs to create the release + upload assets
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist-release
          merge-multiple: true

      - name: Merge binaries.json fragments
        run: |
          set -euo pipefail
          # Combine per-key fragments (binaries-darwin-arm64.json, binaries-linux-x64.json)
          # into the single binaries.json the runtime provisioner reads, then drop them.
          jq -s 'reduce .[] as $m ({packs:{}}; .packs += ($m.packs // {}))' \
            dist-release/binaries-*.json > dist-release/binaries.json
          rm -f dist-release/binaries-*.json
          echo '--- binaries.json:'; cat dist-release/binaries.json
          ls -la dist-release

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          # Human-facing notes: a Download table FIRST (so users don't have to guess
          # which of the assets to grab), then the machine-feed hint, then the auto
          # changelog. The updater-feed assets stay in the release but are called out
          # as ignorable.
          NOTES="$(mktemp)"
          {
            echo "## ⬇️ Download"
            echo
            echo "| OS | File |"
            echo "|----|------|"
            echo "| **macOS** (Apple Silicon) | \`SHELFY-${VER}-arm64.dmg\` |"
            echo "| **Linux** | \`SHELFY-${VER}-x86_64.AppImage\` |"
            echo "| **Windows** | self-rebuild installer — see [docs/install.md](docs/install.md) |"
            echo
            echo "> The \`*.yml\`, \`*.json\` and \`*.tar.gz\` assets are read by the in-app auto-updater — you can ignore them."
            echo
          } > "$NOTES"
          if [[ "$TAG" == *-* ]]; then
            # Beta: ROLLING pre-release, published now (clients read …/releases/download/beta).
            echo "_Rolling beta build from \`$TAG\`._" >> "$NOTES"
            gh release delete beta --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
            gh release create beta \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "SHELFY beta ($TAG)" \
              --notes-file "$NOTES" \
              --prerelease \
              dist-release/*
          else
            # Stable: DRAFT for review — clients see it only once you Publish. Append
            # the auto-generated changelog. Idempotent: drop any existing draft for
            # this tag first so a re-run replaces it (no --cleanup-tag: keep the tag).
            gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" -f tag_name="$TAG" --jq .body >> "$NOTES" || true
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "SHELFY $TAG" \
              --notes-file "$NOTES" \
              --draft \
              dist-release/*
          fi
